<!-- templates/accounts/register.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

  <style>
          body { font-family: Arial, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; }
          h2 { margin-bottom: 24px; }
          .alert { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 10px 14px; border-radius: 4px; margin-bottom: 16px; }
          form p { margin-bottom: 12px; }
          button { padding: 10px 20px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
          button:hover { background: #0056b3; }
          a { color: #007bff; }
  </style>

</head>
<body>
  <h2>Create an Account</h2>

  {% if messages %}
    {% for message in messages %}
      <div class="alert">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
  </form>

  <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</body>
</html>
