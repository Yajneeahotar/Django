<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
        h2 { margin-bottom: 8px; }
        p { margin: 6px 0; color: #555; }
        .card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 24px; margin-top: 24px; }
        button { padding: 10px 20px; background: #dc3545; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #b02a37; }
    </style>   
</head>
<body>
 <h2>Dashboard</h2>

<p>Welcome {{ user.username }}</p>

<form method="POST" action="{% url 'logout_custom' %}">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>

<!-- Logout button (use POST for security) >
<form method="POST" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form-->

  
</body>
</html>
